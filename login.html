<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Healthify</title>

    <!-- font awesome cdn link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CONNECT CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- header navbar section start  -->
    <header>
        <!-- logo name  -->
        <a href="index.html" class="logo">
            <span>H</span>ealthify 
            <br><span>Y</span>our path to better Health.
        </a>

        <!-- navbar link  -->
        <nav class="navbar">
            <ul>
                <li><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="index.html#doctor" class="nav-link"><i class="fas fa-user-md"></i> Doctors</a></li>
                <li><a href="ai-assistant.html" class="nav-link"><i class="fas fa-robot"></i> AI Assistant</a></li>
                <li><a href="index.html#about" class="nav-link"><i class="fas fa-info-circle"></i> About</a></li>
                <li><a href="index.html#contact" class="nav-link"><i class="fas fa-phone"></i> Contact</a></li>
                <li><a href="index.html#blog" class="nav-link"><i class="fas fa-blog"></i> Blog</a></li>
                <li><a href="login.html" class="nav-link login-btn"><i class="fas fa-sign-in-alt"></i> Login</a></li>
            </ul>
        </nav>

        <!-- Emergency contact button -->
        <div class="emergency-contact">
            <a href="tel:+15551234567" class="emergency-btn">
                <i class="fas fa-phone-alt"></i>
                <span>Emergency: (555) 123-4567</span>
            </a>
        </div>

        <div class="fas fa-bars mobile-menu"></div>
    </header>
    <!-- header navbar section end  -->

    <div class="login-container" style="margin-top: 15rem;">

        <h2>Welcome Back</h2>
        <p class="sub">Login to continue</p>

        <form id="loginForm">

            <label>User ID</label>
            <input type="text" id="userid" pattern="[A-Za-z0-9]{3,20}" title="User ID should be 3-20 characters (letters and numbers only)" placeholder="Enter User ID" required>

            <label>Password</label>
            <input type="password" id="password" pattern=".{6,}" title="Password must be at least 6 characters long" placeholder="Enter Password" required>

            <p class="or">OR</p>

            <label>Mobile Number</label>
            <input type="tel" id="mobile" pattern="[0-9]{10}" title="Please enter a valid 10-digit mobile number" placeholder="Enter Mobile Number">

            <button type="submit">Login</button>

            <p class="forgot-password">
                <a href="forgot-password.html">Forgot Password?</a>
            </p>

            <p class="link">
                Don’t have an account?
                <a href="register.html">Create New Account</a>
            </p>

        </form>
    </div>

    <!-- CONNECT JS -->
    <script src="./js/main.js"></script>
    <script src="./js/database-integration.js"></script>
    <script src="./js/whatsapp-notifier.js"></script>
    <script src="login.js"></script>
</body>
</html>
